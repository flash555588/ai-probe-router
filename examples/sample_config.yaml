project:
  eda_tool: kicad
  board_file: main.kicad_pcb
  schematic_file: main.kicad_sch

probe_interface:
  type: test_pad
  side: top
  pad_diameter_mm: 1.5
  min_probe_spacing_mm: 2.54
  preferred_grid_mm: 2.54
  require_silkscreen_labels: true
  require_fiducials: false
  require_tooling_holes: false

nets_to_expose:
  - net: SWDIO
    role: debug
    required: true
  - net: SWCLK
    role: debug
    required: true
  - net: UART_TX
    role: digital
    required: true
  - net: UART_RX
    role: digital
    required: true
  - net: GND
    role: ground
    required: true
    duplicate_probe_count: 4
  - net: 3V3
    role: power
    required: true
    current_ma: 300
  - net: NRST
    role: debug
    required: false
  - net: I2C_SCL
    role: digital
    required: false
  - net: I2C_SDA
    role: digital
    required: false

routing_rules:
  default_trace_width_mm: 0.15
  power_trace_width_mm: 0.5
  min_clearance_mm: 0.15
  max_vias_per_signal: 2
  avoid_under_components: true

placement_rules:
  keep_probe_pads_on_grid: true
  avoid_tall_components: true
  min_distance_from_board_edge_mm: 2.0
  group_by_function: true
