project:
  eda_tool: kicad
  board_file: main.kicad_pcb
  schematic_file: main.kicad_sch

probe_interface:
  type: test_pad
  side: top
  pad_diameter_mm: 1.27
  min_probe_spacing_mm: 2.54
  preferred_grid_mm: 2.54
  require_silkscreen_labels: true
  require_fiducials: true
  require_tooling_holes: true

nets_to_expose:
  - net: VCC
    role: power
    required: true
    current_ma: 100
  - net: GND
    role: ground
    required: true
    duplicate_probe_count: 3
  - net: UART_TX
    role: communication
    required: true
  - net: UART_RX
    role: communication
    required: true
  - net: STATE
    role: digital
    required: false
  - net: LED
    role: digital
    required: false
  - net: EN
    role: digital
    required: false

routing_rules:
  default_trace_width_mm: 0.15
  power_trace_width_mm: 0.3
  min_clearance_mm: 0.15

placement_rules:
  min_distance_from_board_edge_mm: 1.5

protection:
  enabled: true
  debug:
    type: series_resistor
    value: "33"
    package: "0402"
  reset:
    type: series_resistor
    value: "100"
    package: "0402"
  power:
    type: ferrite_bead
    value: "600R@100MHz"
    package: "0603"
    ref_prefix: FB
