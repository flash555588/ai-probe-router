project:
  eda_tool: kicad
  board_file: main.kicad_pcb
  schematic_file: main.kicad_sch

probe_interface:
  type: test_pad
  side: top
  pad_diameter_mm: 1.5
  min_probe_spacing_mm: 2.54
  preferred_grid_mm: 2.54
  require_silkscreen_labels: true
  require_fiducials: true
  require_tooling_holes: true

nets_to_expose:
  - net: SWDIO
    role: debug
    required: true
    preferred_devboard_pins: [PA13]
  - net: SWCLK
    role: debug
    required: true
    preferred_devboard_pins: [PA14]
  - net: UART_TX
    role: communication
    required: true
    preferred_devboard_pins: [D8_PA9, D10_PB6]
  - net: UART_RX
    role: communication
    required: true
    preferred_devboard_pins: [D2_PA10]
  - net: GND
    role: ground
    required: true
    duplicate_probe_count: 4
  - net: 3V3
    role: power
    required: true
    current_ma: 300
  - net: NRST
    role: reset
    required: false

routing_rules:
  default_trace_width_mm: 0.15
  power_trace_width_mm: 0.5
  min_clearance_mm: 0.15
  max_vias_per_signal: 2
  avoid_under_components: true

placement_rules:
  keep_probe_pads_on_grid: true
  avoid_tall_components: true
  min_distance_from_board_edge_mm: 2.0
  group_by_function: true

development_board:
  pin_database: ../ai_probe_router/libraries/dev_boards/stm32_nucleo_64.yaml

protection:
  enabled: true
  debug:
    type: series_resistor
    value: "33"
    package: "0402"
  reset:
    type: series_resistor
    value: "100"
    package: "0402"
  power:
    type: ferrite_bead
    value: "600R@100MHz"
    package: "0603"
    ref_prefix: FB
