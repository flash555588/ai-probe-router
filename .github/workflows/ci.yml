name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system --locked

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest --tb=short -ra -q

      - name: Optional native KiCad validation
        run: python scripts/kicad_native_validate.py examples/audio_player_project

  dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system --locked

      - name: Upgrade pip (fix PYSEC-2026-196 in the runner toolchain)
        run: python -m pip install --upgrade "pip>=26.1.2"

      - name: Audit Python dependencies
        run: pip-audit --progress-spinner off

  native-kicad:
    runs-on: ubuntu-latest
    container: ghcr.io/inti-cmnb/kicad9_auto:1.8.5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system --locked

      - name: Required native KiCad validation
        id: audio_native
        continue-on-error: true
        run: |
          mkdir -p validation/reports/audio
          python scripts/kicad_native_validate.py \
            examples/audio_player_project \
            --report-dir "$PWD/validation/reports/audio" \
            --baseline "$PWD/examples/audio_player_project/ci/native-baseline.kicad9.json" \
            --block-new-regressions \
            --require-kicad \
            --strict

      - name: Generate strict native sample
        run: |
          rm -rf /tmp/apr-native-smoke
          mkdir -p /tmp/apr-native-smoke
          cp examples/minimal_project/main.kicad_pcb /tmp/apr-native-smoke/main.kicad_pcb
          cp examples/minimal_project/main.kicad_sch /tmp/apr-native-smoke/main.kicad_sch
          cat > /tmp/apr-native-smoke/config.yaml <<'YAML'
          project:
            eda_tool: kicad
            board_file: main.kicad_pcb
            schematic_file: main.kicad_sch

          probe_interface:
            type: test_pad
            side: top
            pad_diameter_mm: 1.5
            min_probe_spacing_mm: 2.54
            preferred_grid_mm: 2.54
            require_silkscreen_labels: false
            require_fiducials: false
            require_tooling_holes: false

          nets_to_expose:
            - net: SWDIO
              role: debug
              required: true
            - net: GND
              role: ground
              required: true

          process_controls:
            strict_signoff: true
            require_autorouter_feedback: false
            require_manufacturing_exports: true
          YAML
          apr generate /tmp/apr-native-smoke/config.yaml \
            -d /tmp/apr-native-smoke \
            --quality-gate "$PWD/ci/thresholds/minimal.json"
          test -f /tmp/apr-native-smoke/output/main.kicad_pcb
          test -f /tmp/apr-native-smoke/output/main.kicad_sch
          test -f /tmp/apr-native-smoke/output/manufacturing/placement.csv

      - name: Validate generated native sample
        id: smoke_native
        continue-on-error: true
        run: |
          mkdir -p validation/reports/smoke
          python scripts/kicad_native_validate.py \
            /tmp/apr-native-smoke/output \
            --report-dir "$PWD/validation/reports/smoke" \
            --require-kicad \
            --strict

      - name: Verify native report artifacts
        if: always()
        run: |
          test -f validation/reports/audio/summary.json
          test -f validation/reports/audio/kicad-version.txt
          test -f validation/reports/audio/file-list.txt
          test -f validation/reports/audio/artifact_manifest.json
          test -f validation/reports/audio/erc/erc.json
          test -f validation/reports/audio/drc/drc.json
          test -f validation/reports/audio/parity/parity.json

      - name: Upload native KiCad reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: native-validation-reports
          path: validation/reports/**
          if-no-files-found: error

      - name: Fail on native validation result
        if: steps.audio_native.outcome == 'failure' || steps.smoke_native.outcome == 'failure'
        run: exit 1
