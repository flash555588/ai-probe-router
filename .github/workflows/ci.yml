name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest --tb=short -ra -q

      - name: Optional native KiCad validation
        run: python scripts/kicad_native_validate.py examples/audio_player_project

  dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Audit Python dependencies
        run: pip-audit --progress-spinner off

  native-kicad:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container: ghcr.io/inti-cmnb/kicad8_auto:latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Required native KiCad validation
        run: python scripts/kicad_native_validate.py examples/audio_player_project --require-kicad

      - name: Generate strict native sample
        run: |
          rm -rf /tmp/apr-native-smoke
          mkdir -p /tmp/apr-native-smoke
          cp examples/minimal_project/main.kicad_pcb /tmp/apr-native-smoke/main.kicad_pcb
          cp examples/minimal_project/main.kicad_sch /tmp/apr-native-smoke/main.kicad_sch
          cat > /tmp/apr-native-smoke/config.yaml <<'YAML'
          project:
            eda_tool: kicad
            board_file: main.kicad_pcb
            schematic_file: main.kicad_sch

          probe_interface:
            type: test_pad
            side: top
            pad_diameter_mm: 1.5
            min_probe_spacing_mm: 2.54
            preferred_grid_mm: 2.54
            require_silkscreen_labels: false
            require_fiducials: false
            require_tooling_holes: false

          nets_to_expose:
            - net: SWDIO
              role: debug
              required: true
            - net: GND
              role: ground
              required: true

          process_controls:
            strict_signoff: true
            require_autorouter_feedback: false
            require_manufacturing_exports: true
          YAML
          apr generate /tmp/apr-native-smoke/config.yaml -d /tmp/apr-native-smoke
          test -f /tmp/apr-native-smoke/output/main.kicad_pcb
          test -f /tmp/apr-native-smoke/output/main.kicad_sch
          test -f /tmp/apr-native-smoke/output/manufacturing/placement.csv

      - name: Validate generated native sample
        run: |
          python scripts/kicad_native_validate.py \
            /tmp/apr-native-smoke/output \
            --require-kicad

      - name: Upload native KiCad reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: native-kicad-reports
          path: |
            examples/audio_player_project/build/kicad/
            /tmp/apr-native-smoke/output/build/kicad/
          if-no-files-found: warn
