module:
  name: protected_probe_fixture
  type: protected_probe_fixture
  version: "1.0.0"

provides:
  - PROBE_FIXTURE
  - ESD_PROTECTED_PROBES

implementations:
  - name: pogo_array_with_esd_and_fixture_id
    version: "1.0.0"
    interfaces: [i2c]
    features:
      - ESD_PROTECTION
    components:
      - type: testpad
        count: 16
        footprint_version: "1.27mm"
        alternate_footprints: ["2.54mm"]
      - type: esd_array
        count: 4
        chip: generic_gpio_esd_array
        chip_version: "1.0.0"
        package_options: ["SOT-23-6"]
        footprint_version: "kicad-8"
        alternate_chips: ["generic_gpio_esd_array_alt"]
        alternate_footprints: ["DFN-6"]
      - type: eeprom
        count: 1
        chip: generic_i2c_eeprom
        chip_version: "1.0.0"
        package_options: ["TSSOP-8"]
        footprint_version: "kicad-8"
        alternate_chips: ["generic_i2c_eeprom_alt"]
        alternate_footprints: ["SOIC-8"]
      - type: pullup_resistor
        count: 2
        footprint_version: "0402"
        alternate_footprints: ["0603"]
    area_mm2: 220
    bom_cost: 1.25
    constraints:
      i2c_address: "0x50"
      human_review_required: false
