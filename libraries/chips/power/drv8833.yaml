chip:
  mpn: drv8833
  category: power
  description: Dual H-Bridge motor driver
  symbol: Driver_Motor:DRV8833

package_options:
  - name: HTSSOP-16
    footprint: Package_SO:HTSSOP-16-1EP_4.4x5mm_P0.65mm_EP3.4x5mm_Mask2.46x2.31mm
    area_mm2: 22
  - name: WSON-16
    footprint: Package_SON:WSON-16-1EP_4x4mm_P0.5mm_EP2.6x2.6mm
    area_mm2: 16

power:
  domains:
    - name: VM
      voltage_min: 2.7
      voltage_max: 10.8
      current_typ_ma: 0
      current_max_ma: 1500
    - name: VINT
      voltage_min: 2.7
      voltage_max: 10.8

interfaces:
  - type: pwm
    pins: [AIN1, AIN2, BIN1, BIN2]
  - type: gpio
    pins: [NSLEEP, NFAULT]

pins:
  - name: AIN1
    direction: input
    capabilities: [PWM]
  - name: AIN2
    direction: input
    capabilities: [PWM]
  - name: BIN1
    direction: input
    capabilities: [PWM]
  - name: BIN2
    direction: input
    capabilities: [PWM]
  - name: NSLEEP
    direction: input
    capabilities: [GPIO]
  - name: NFAULT
    direction: output
    capabilities: [GPIO]

constraints:
  require_charge_pump_cap: true
  review_required: false
