module:
  name: sd_card_interface
  type: sd_card
  version: "1.0.0"

provides:
  - SD_MMC_INTERFACE
  - SDIO_INTERFACE
  - SPI_FALLBACK

implementations:
  - name: sd_card_slot_sdmmc
    version: "1.0.0"
    interfaces: [sdio, spi]
    features:
      - PUSH_PUSH_SLOT
      - DETECTION_SWITCH
      - WRITE_PROTECT_SWITCH
    components:
      - type: sd_card_connector
        count: 1
        package_options: ["microSD_push_push"]
        footprint_version: "kicad-8"
      - type: esd_diode
        count: 1
        footprint_version: "SOT-23-6"
      - type: pullup_resistor
        count: 6
        value: "10k"
        footprint_version: "0402"
      - type: series_resistor
        count: 6
        value: "22"
        footprint_version: "0402"
    area_mm2: 150
    bom_cost: 1.20
    constraints:
      bus_speed_mhz: 50
      human_review_required: false
