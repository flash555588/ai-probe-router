module:
  name: generic_debug_access
  type: debug
  version: "1.0.0"

provides:
  - DEBUG_ACCESS
  - RESET_ACCESS

implementations:
  - name: protected_debug_header
    version: "1.0.0"
    interfaces: [swd, uart, gpio]
    features:
      - ESD_PROTECTION
      - DIRECT_TESTPAD
    components:
      - type: connector
        count: 1
        package_options: ["PinHeader_1x05", "TagConnect_6"]
        footprint_version: "kicad-8"
      - type: series_resistor
        count: 3
        value: "22"
        footprint_version: "0402"
      - type: esd_array
        count: 1
        chip: generic_gpio_esd_array
        chip_version: "1.0.0"
        footprint_version: "SOT-23-6"
    area_mm2: 45
    bom_cost: 0.30
    constraints:
      human_review_required: false
